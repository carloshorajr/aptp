{% extends "base.html" %}

{% block content %}

<div class="metrics-panel">

    <div class="metrics-section">

        <h3>MÉTRICAS - WIFI</h3>

        <div class="metric-item">

            <span class="metric-label">

                Conectividade

                <span class="metric-tooltip">

                    <i class="fa fa-info-circle"></i>

                    <span class="metric-tooltip-text">

                        <ul style="margin:6px 0 0 16px;padding:0;">
                            <li>coleta os eventos de associação e desassociação da interface de rede WiFi.</li>
                            <br>
                            <li>monitora o tempo atual da última associação com uma rede WiFi.</li>
                        </ul>

                    </span>

                </span>

            </span>

            <span class="metric-actions">

                <input

                    id="connectivity-interval"

                    data-value="{{ settings.connectivity.interval_seconds }}"

                    class="metric-interval"

                    type="number"

                    min="1"

                    value="{{ settings.connectivity.interval_seconds }}"

                >

                <button

                    id="connectivity-enabled"

                    data-enabled="{{ 'true' if settings.connectivity.enabled else 'false' }}"

                    type="button"

                    class="btn {% if settings.connectivity.enabled %}metric-enabled{% else %}metric-disabled{% endif %}"

                >

                    <i class="fa fa-check"></i>

                </button>

            </span>

        </div>

    </div>

    <div class="metrics-toolbar">

        <button
            id="save-button"
            type="button"
            class="btn btn-primary"
        >

            <i class="fa fa-floppy-o"></i>

            <span>Salvar</span>

        </button>

        <button
            id="clear-button"
            type="button"
            class="btn btn-outline"
        >

            <i class="fa fa-refresh"></i>

            <span>Limpar</span>

        </button>

    </div>

</div>

{% endblock %}
