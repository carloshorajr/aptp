<div id="modal-overlay" class="modal-overlay">

    <div class="modal">

        <div
            id="modal-icon"
            class="modal-icon modal-icon-danger"
        >

            <i
                id="modal-icon-symbol"
                class="fa fa-trash"
            ></i>

        </div>

        <div
            id="modal-title"
            class="modal-title"
        >
        </div>

        <div class="modal-divider"></div>

        <div
            id="modal-message"
            class="modal-message"
        >
        </div>

        <div class="modal-actions">

            <button
                id="modal-cancel"
                class="btn btn-outline"
            >
                Cancelar
            </button>

            <button
                id="modal-confirm"
                class="btn btn-danger"
            >
                Apagar
            </button>

        </div>

    </div>

</div>
