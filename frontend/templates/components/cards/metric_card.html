<div class="metric-card">

    <div class="metric-title">
        {{ title }}
    </div>

    {% if subtitle %}
    <div class="metric-subtitle">
        {{ subtitle }}
    </div>
    {% endif %}

    <div
        class="metric-value"
        {% if element_id %}
        id="{{ element_id }}"
        {% endif %}
    >
        {{ value }}
    </div>

</div>
