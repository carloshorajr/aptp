{% if href %}

<a
    href="{{ href }}"
    class="btn {{ css_class }}"
>

    {% if icon %}
        <i class="fa fa-{{ icon }}"></i>
    {% endif %}

    <span>{{ label }}</span>

</a>

{% else %}

<button
    type="{{ type|default('button') }}"
    class="btn {{ css_class }}"
    {% if onclick %}
    onclick="{{ onclick }}"
    {% endif %}
>

    {% if icon %}
        <i class="fa fa-{{ icon }}"></i>
    {% endif %}

    <span>{{ label }}</span>

</button>

{% endif %}
