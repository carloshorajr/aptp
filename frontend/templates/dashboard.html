{% extends "base.html" %}

{% block content %}

<h3 class="section-title">

    Gráficos - WiFi

</h3>

<div class="dashboard-grid">

    <div class="dashboard-card">

        <div class="dashboard-card-header">

            Conectividade

        </div>

        <div class="dashboard-card-body">

            <canvas id="wifi-connectivity-chart"></canvas>

        </div>

    </div>

    <div class="dashboard-card">

        <div class="dashboard-card-header">

            Estado da Conexão

        </div>

        <div class="dashboard-card-body dashboard-status">

            <div
                id="wifi-status-indicator"
                class="dashboard-status-indicator dashboard-status-connected"
            >

                <span class="dashboard-status-dot"></span>

                <span id="wifi-status-text">

                    Conectado

                </span>

            </div>

            <div class="dashboard-status-field">

                <span class="dashboard-status-label">

                    SSID

                </span>

                <span
                    id="wifi-connected-ssid"
                    class="dashboard-status-text"
                >

                    --

                </span>

            </div>

            <div class="dashboard-status-field">

                <span class="dashboard-status-label">

                    Tempo

                </span>

                <span
                    id="wifi-connected-time"
                    class="dashboard-status-time"
                >

                    --:--:--

                </span>

            </div>

        </div>

    </div>

    <div class="dashboard-card">

    <div class="dashboard-card-header">

        Qualidade do Sinal

    </div>

    <div class="dashboard-card-body dashboard-signal">

        <div
            id="wifi-signal-icon"
            class="dashboard-signal-icon"
        >

            <span class="signal-bar"></span>
            <span class="signal-bar"></span>
            <span class="signal-bar"></span>
            <span class="signal-bar"></span>

        </div>

        <div
            id="wifi-signal-quality"
            class="dashboard-signal-quality"
        >

            --

        </div>

        <div
            id="wifi-signal-value"
            class="dashboard-signal-value"
        >

            --

        </div>

    </div>

</div>

{% endblock %}
