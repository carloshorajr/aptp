{% extends "base.html" %}

{% block content %}

<div class="settings-panel">

    <div class="settings-section">

        <h3>WIFI</h3>

            <div class="wifi-toolbar">

                <button
                    id="scan-wifi-button"
                    type="button"
                    class="btn btn-primary"
                    onclick="Network.scanWifi()"
                >

                    <i class="fa fa-wifi"></i>

                    <span>Escanear</span>

                </button>

                <button
                    type="button"
                    class="btn btn-outline"
                    onclick="Network.clear()"
                >

                    <i class="fa fa-refresh"></i>

                    <span>Limpar</span>

                </button>

            </div>

            <div class="wifi-table">

                <div id="wifi-list">

                    {% if networks %}

                        {% for network in networks %}

                        <div class="wifi-item">

                            <div class="wifi-network">

                                <span class="wifi-ssid">

                                    {{ network.ssid }}

                                </span>

                                <span class="wifi-band {% if network.frequency >= 5000 %}wifi-band-5{% else %}wifi-band-24{% endif %}">

                                    {{ network.band }}

                                </span>

                            </div>

                            <div class="wifi-actions">

                                <button
                                    type="button"
                                    class="btn btn-outline wifi-icon-btn"
                                    title="Detalhes"

                                    data-ssid="{{ network.ssid }}"
                                    data-frequency="{{ network.band }}"
                                    data-channel="{{ network.channel }}"
                                    data-signal="{{ network.signal }}"
                                    data-security="{{ network.security }}"
                                    data-saved="{{ network.saved|lower }}"
                                    data-connected="{{ network.connected|lower }}"

                                    onclick="Network.showWifiDetails(this)"
                                >

                                    <i class="fa fa-info-circle"></i>

                                </button>

                                <button
                                    type="button"
                                    class="btn {% if network.connected %}btn-danger{% else %}btn-primary{% endif %} wifi-icon-btn"

                                    title="{% if network.connected %}Desconectar{% else %}Conectar{% endif %}"

                                    data-ssid="{{ network.ssid }}"
                                    data-connected="{{ network.connected|lower }}"

                                    onclick="Network.toggleWifi(this)"
                                >

                                    <i class="fa fa-{% if network.connected %}chain-broken{% else %}plug{% endif %}"></i>

                                </button>

                            </div>

                        </div>

                        {% endfor %}

                    {% else %}

                        <div class="wifi-empty">

                            Clique em "Escanear" para mostrar as redes WiFi disponíveis para associação.

                        </div>

                    {% endif %}

                </div>

            </div>

            </div>

    </div>

</div>

{% endblock %}
